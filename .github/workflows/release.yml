name: Release

on:
  workflow_dispatch:

permissions: {}

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run community:check
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: obsidian-runtime-assets
          path: |
            main.js
            manifest.json
            styles.css
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: obsidian-runtime-assets
          path: release-assets
      - id: manifest
        run: echo "version=$(node -p "require('./release-assets/manifest.json').version")" >> "$GITHUB_OUTPUT"
      - uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: |
            release-assets/main.js
            release-assets/manifest.json
            release-assets/styles.css
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.manifest.outputs.version }}
          name: ${{ steps.manifest.outputs.version }}
          files: |
            release-assets/main.js
            release-assets/manifest.json
            release-assets/styles.css
